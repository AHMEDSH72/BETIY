    <section class="auth-section">
      <div class="auth-card">
        <div class="header">
          <h2>إنشاء حساب جديد</h2>
          <p>انضم إلينا وابدأ تجربة فريدة في منطقتك</p>
        </div>

        <form id="registerForm">
          <div class="form-grid">
            <div class="field">
              <label>الاسم بالكامل</label>
              <input type="text" id="name" placeholder="أدخل اسمك..." required>
            </div>

            <div class="field">
              <label>رقم الموبايل</label>
              <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>
            </div>

            <div class="field">
              <label>نوع الحساب</label>
              <select id="role" required>
                <option value disabled selected>اختر رتبتك</option>
                <option value="admin">مدير (Admin)</option>
                <option value="chef">شيف (Chef)</option>
                <option value="client">عميل (Client)</option>
              </select>
            </div>

            <div class="field">
              <label>كلمة المرور</label>
              <input type="password" id="pass" placeholder="••••••••" required>
            </div>
          </div>

          <button type="submit" class="submit-btn">إنشاء الحساب</button>
          <div class="separator"><span>أو الدخول بواسطة</span></div>

          <div class="social-login">
            <button type="button" class="btn-social google"
              onclick="loginGoogle()">
              <span>Google</span>
            </button>
            <button type="button" class="btn-social facebook"
              onclick="loginFB()">
              <span>Facebook</span>
            </button>
          </div>
          <div class="auth-footer">
            <p>لديك حساب بالفعل؟ <a href="./loginForm.html" class="login-link">تسجيل
                دخول</a></p>
          </div>
        </form>
      </div>
    </section>
